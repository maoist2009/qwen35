name: Qwen SSH Persistent Workspace

on:
  workflow_dispatch:

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hours SSH session limit

    env:
      WORKDIR: ${{ github.workspace }}/work

    steps:

    # ----------------------------
    # 1. Checkout
    # ----------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------
    # 2. Node.js (runner default Node 24 OK)
    # ----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    # ----------------------------
    # 3. Cache Qwen memory (restore only)
    # ----------------------------
    - name: Cache Qwen memory
      uses: actions/cache@v4
      with:
        path: /home/runner/.qwen
        key: qwen-memory-global

    # ----------------------------
    # 4. Cache work directory (restore only)
    # ----------------------------
    - name: Cache work directory
      uses: actions/cache@v4
      with:
        path: work
        key: work-global

    # ----------------------------
    # 5. Init workspace
    # ----------------------------
    - name: Init workspace
      run: |
        mkdir -p /home/runner/.qwen
        mkdir -p $WORKDIR
        echo "workspace ready" > $WORKDIR/init.txt
        npm i -g @qwen-code/qwen-code

    # ----------------------------
    # 6. Restore Qwen config (first run only)
    # ----------------------------
    - name: Ensure Qwen exists
      run: |
        if [ ! -f /home/runner/.qwen/.ready ]; then
          unzip -P "${{ secrets.QWEN_ZIP_PASSWORD }}" qwen35.zip -d /home/runner/.qwen && rm qwen35.zip
          touch /home/runner/.qwen/.ready
        else
          echo "Qwen memory restored from cache"
        fi

    # ----------------------------
    # 7. SSH SESSION (main control point)
    # ---------------------------
    - name: Start ngrok SSH tunnel
      env:
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        # 1. 设置当前用户的 SSH 密码（连接时需要用到，可以自定义更改）
        echo "runner:password123" | sudo chpasswd
        
        # 2. 确保容器内的 SSH 服务已启动
        sudo systemctl start ssh

        # 3. 下载并安装官方最新版 ngrok
        curl -s https://amazonaws.com | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y

        # 4. 配置并激活你的 ngrok 凭证
        ngrok config add-authtoken "$NGROK_AUTHTOKEN"

        # 5. 在后台静默启动 ngrok 隧道，将本地的 22 (SSH) 端口映射出去
        # 使用 log=stdout 将连接地址直接打印在 GitHub Actions 的日志控制台中
        echo "=== 正在建立 ngrok 稳定专属隧道 ==="
        ngrok tcp 22 --log=stdout &

        # 6. 等待隧道初始化并提取远程连接地址
        sleep 5
        echo "=== 请复制下方的 SSH 命令在本地终端执行 ==="
        curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*'
        
        # 7. 核心阻断机制：让容器进入无限循环挂起状态，直到达到 GitHub 的 6 小时硬上限或你手动结束
        while true; do
          sleep 60
        done
      # 限制此步骤在 GitHub 的最高时限（6小时）内，防止意外死循环烧满额度
      timeout-minutes: 350



    # =========================================================
    # 8. BACKUP QWEN MEMORY (ALWAYS SAFE)
    # =========================================================
    - name: Backup Qwen memory
      if: always()
      run: |
        tar -czf /tmp/qwen.tar.gz -C /home/runner .qwen || true

    - name: Upload Qwen memory
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qwen-memory
        path: /tmp/qwen.tar.gz
        if-no-files-found: warn

    # =========================================================
    # 9. BACKUP WORK DIRECTORY (ALWAYS SAFE)
    # =========================================================
    - name: Backup work directory
      if: always()
      run: |
        tar -czf /tmp/work.tar.gz -C $GITHUB_WORKSPACE work || true

    - name: Upload work directory
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: work-backup
        path: /tmp/work.tar.gz
        if-no-files-found: warn

    # ----------------------------
    # 10. Optional logs dump
    # ----------------------------
    - name: Dump logs
      if: always()
      run: |
        tar -czf /tmp/logs.tar.gz $GITHUB_WORKSPACE || true

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: /tmp/logs.tar.gz
        if-no-files-found: warn