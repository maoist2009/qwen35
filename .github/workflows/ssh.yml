name: Qwen SSH Persistent Workspace

on:
  workflow_dispatch:

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hours SSH session limit

    env:
      WORKDIR: ${{ github.workspace }}/work

    steps:

    # ----------------------------
    # 1. Checkout
    # ----------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------
    # 2. Node.js (runner default Node 24 OK)
    # ----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    # ----------------------------
    # 3. Cache Qwen memory (restore only)
    # ----------------------------
    - name: Cache Qwen memory
      uses: actions/cache@v4
      with:
        path: /home/runner/.qwen
        key: qwen-memory-global

    # ----------------------------
    # 4. Cache work directory (restore only)
    # ----------------------------
    - name: Cache work directory
      uses: actions/cache@v4
      with:
        path: work
        key: work-global

    # ----------------------------
    # 5. Init workspace
    # ----------------------------
    - name: Init workspace
      run: |
        mkdir -p /home/runner/.qwen
        mkdir -p $WORKDIR
        echo "workspace ready" > $WORKDIR/init.txt
        npm i -g @qwen-code/qwen-code

    # ----------------------------
    # 6. Restore Qwen config (first run only)
    # ----------------------------
    - name: Ensure Qwen exists
      run: |
        if [ ! -f /home/runner/.qwen/.ready ]; then
          unzip -P "${{ secrets.QWEN_ZIP_PASSWORD }}" qwen35.zip -d /home/runner/.qwen && rm qwen35.zip
          touch /home/runner/.qwen/.ready
        else
          echo "Qwen memory restored from cache"
        fi

    # ----------------------------
    # 7. SSH SESSION (main control point)
    # ---------------------------
    - name: Setup SSH tunnel
      run: |
        # 生成 SSH 密钥
        mkdir -p ~/.ssh
        ssh-keygen -t ed25519 -f ~/.ssh/temp_key -N "" -q
        cat ~/.ssh/temp_key.pub >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        
        # 启动 SSH
        sudo systemctl start ssh.socket
        sudo systemctl start ssh.service
        
        # 下载 cloudflared
        curl -sSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
        chmod +x /usr/local/bin/cloudflared
        
        # 启动隧道
        cloudflared tunnel --url tcp://localhost:22 --logfile /tmp/cf.log &
        sleep 10
        
        # 输出连接信息
        TUNNEL_URL=$(grep -o 'tcp://[^ ]*\.trycloudflare\.com:[0-9]*' /tmp/cf.log | head -1)
        echo "=== SSH 连接信息 ==="
        echo "隧道地址: ${TUNNEL_URL#tcp://}"
        echo ""
        echo "私钥（保存到本地文件）:"
        cat ~/.ssh/temp_key
        echo ""
        echo "连接命令:"
        echo "ssh -i <私钥文件路径> -o ProxyCommand='cloudflared access tcp --hostname ${TUNNEL_URL#tcp://}' runner@localhost"
        
        # 保活
        while true; do sleep 60; done
      timeout-minutes: 350

    # =========================================================
    # 8. BACKUP QWEN MEMORY (ALWAYS SAFE)
    # =========================================================
    - name: Backup Qwen memory
      if: always()
      run: |
        tar -czf /tmp/qwen.tar.gz -C /home/runner .qwen || true

    - name: Upload Qwen memory
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qwen-memory
        path: /tmp/qwen.tar.gz
        if-no-files-found: warn

    # =========================================================
    # 9. BACKUP WORK DIRECTORY (ALWAYS SAFE)
    # =========================================================
    - name: Backup work directory
      if: always()
      run: |
        tar -czf /tmp/work.tar.gz -C $GITHUB_WORKSPACE work || true

    - name: Upload work directory
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: work-backup
        path: /tmp/work.tar.gz
        if-no-files-found: warn

    # ----------------------------
    # 10. Optional logs dump
    # ----------------------------
    - name: Dump logs
      if: always()
      run: |
        tar -czf /tmp/logs.tar.gz $GITHUB_WORKSPACE || true

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: /tmp/logs.tar.gz
        if-no-files-found: warn