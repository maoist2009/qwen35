name: Debug and Upload LiteRT Build

on:
  workflow_dispatch:

jobs:
  build_and_debug:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 或者你的项目所需的 Node 版本

    # 3. 安装 Qwen Code CLI
    - name: Install Qwen Code
      run: npm install -g @qwen-code/qwen-code

    # --- 1. SSH Debugging Step ---
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 350
      with:
        limit-access-to-actor: true

    # --- 2. Upload Build Log (runs even if canceled/failed) ---
    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_litert_final.log
        if-no-files-found: warn

    # --- 3. Upload LiteRT Artifacts (runs even if canceled/failed) ---
    - name: Upload LiteRT Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: litert-compiled-models-and-libs
        path: |
          **/*.tflite
        if-no-files-found: warn