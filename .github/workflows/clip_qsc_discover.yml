name: DreamLite clip — qsc-cli interface discovery

# Cheap discovery (no heavy pip/toolchain): install qsc-cli.deb, then dump the
# REAL qsc-cli interface (--help, update subcommands, pre/post-login `sdk`
# subcommand) so we can pin the exact SDK-download invocation. The prior probe
# failed because `qsc-cli sdk` was "unknown command" on the installed 1.12.0.

on:
  workflow_dispatch:
    inputs:
      qsc_email:
        description: "qsc-cli login email (temporary; prefer QSC_EMAIL secret)"
        required: false
        default: ""
      qsc_pass:
        description: "qsc-cli login password (temporary; prefer QSC_PASSWORD secret)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      QSC_EMAIL: ${{ github.event.inputs.qsc_email != '' && github.event.inputs.qsc_email || secrets.QSC_EMAIL }}
      QSC_PASSWORD: ${{ github.event.inputs.qsc_pass != '' && github.event.inputs.qsc_pass || secrets.QSC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Discover qsc-cli interface
        run: bash .github/scripts/discover_qsc.sh
      - name: Upload discovery log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qsc-discover-log
          path: /home/runner/litert_workspace/qsc_discover.log
          if-no-files-found: warn
