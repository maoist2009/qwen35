name: DreamLite clip — qsc-cli download/info discovery

# Second discovery: login, then dump `qsc-cli download --help` and
# `qsc-cli info` (product/release list) so we can pin the exact SDK-download
# invocation. The top-level `download` command replaces the non-existent
# `qsc-cli sdk download` from the stale skill.

on:
  workflow_dispatch:
    inputs:
      qsc_email:
        description: "qsc-cli login email (temporary; prefer QSC_EMAIL secret)"
        required: false
        default: ""
      qsc_pass:
        description: "qsc-cli login password (temporary; prefer QSC_PASSWORD secret)"
        required: false
        default: ""

jobs:
  discover2:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      QSC_EMAIL: ${{ github.event.inputs.qsc_email != '' && github.event.inputs.qsc_email || secrets.QSC_EMAIL }}
      QSC_PASSWORD: ${{ github.event.inputs.qsc_pass != '' && github.event.inputs.qsc_pass || secrets.QSC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Discover qsc-cli download/info interface
        run: bash .github/scripts/discover_qsc2.sh
      - name: Upload discovery log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qsc-discover2-log
          path: /home/runner/litert_workspace/qsc_discover2.log
          if-no-files-found: warn
